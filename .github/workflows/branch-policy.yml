name: Branch Policy

on:
  pull_request:
    branches: ["main"]

jobs:
  validate-source-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Validate source branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "PR source branch: $BRANCH"

          if [[ ! "$BRANCH" =~ ^(feature|integration)\/[a-z0-9._-]+$ ]]; then
            echo "Branch policy violation."
            echo "Use branches with format: feature/<short-description> or integration/<short-description>."
            echo "Examples: feature/add-root-operation, integration/midterm-final"
            exit 1
          fi